bundle:
  name: hey-isaac-infra

include:
  - resources/*.yml

variables:
  catalog:
    description: >
      The Unity Catalog catalog for Hey Isaac / Hi Genie data objects.
      USED ONLY by the schema resource — all other resources reference the schema
      through deployed-resource substitutions.
  schema:
    description: >
      The Unity Catalog schema name within the catalog.
      USED ONLY by the schema resource.
  secret_scope_name:
    description: Databricks secret scope for Hey Isaac / Hi Genie credentials.
    default: hi_genie_dev_credentials
  workspace_id:
    description: >-
      Numeric workspace ID (from the workspace URL, e.g. 7474657291520070).
      Used to compute the app public URL and persona issuer.
    # No default — must be set per target.
  cloud:
    description: >-
      Cloud provider slug for the workspace (aws, azure, gcp).
      Used to compute the app public URL and persona issuer.
    default: aws
  lakebase_project_id:
    description: >
      Lakebase Autoscaling project ID. Shared per-environment project — dev and
      production environments have isolated OLTP databases, while individual
      developers get their own branch within the shared dev project. The
      project_id is a globally unique slug within the workspace — unlike
      display_name, it is NOT prefixed by DABs development mode.
    default: hi-genie
  run_as_user:
    description: The user or service principal that workflows should run as.
    default: ${workspace.current_user.userName}
  user_handle:
    description: >
      Deploying user's handle (e.g. matthew_giglia) — email prefix with dots
      replaced by underscores. Injected automatically by deploy.sh for the dev
      target. Do not set manually.
    default: ""
  higher_level_service_principal:
    description: Service principal application ID for non-dev deployments.
    default: ""
  serverless_environment_version:
    description: The serverless environment version for notebook/job tasks.
    default: "5"
  tags_project:
    default: hey-isaac-hi-genie
    description: Project tag for deployed resources.
  tags_developer:
    default: ""
    description: Primary developer contact.
  tags_RemoveAfter:
    default: 2027-06-30
    description: Required demo-environment expiry tag.

targets:

  dev:
    mode: development
    default: true
    presets:
      source_linked_deployment: false
      tags:
        project: ${var.tags_project}
        developer: ${var.tags_developer}
        RemoveAfter: ${var.tags_RemoveAfter}
        env: ${bundle.target}
    workspace:
      host: https://fevm-hls-fde.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: hls_fde_dev
      schema: hi_genie
      lakebase_project_id: dev-hi-genie
      workspace_id: "7474657291520070"
      cloud: aws
      secret_scope_name: "dev_${var.user_handle}_hi_genie_credentials"
      # prod targets should explicitly set run_as_user to a service principal

  staging:
    workspace:
      host: https://fevm-hls-fde.cloud.databricks.com
    variables:
      catalog: hls_fde_staging
      schema: hi_genie
      lakebase_project_id: hi-genie
      workspace_id: "7474657291520070"
      cloud: aws
      secret_scope_name: hi_genie_staging_credentials
