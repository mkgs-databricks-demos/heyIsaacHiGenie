resources:
  postgres_projects:
    hi_genie_lakebase:
      project_id: ${var.lakebase_project_id}
      display_name: Hey Isaac / Hi Genie — Lakebase
      pg_version: 17
      history_retention_duration: "604800s"
      default_endpoint_settings:
        autoscaling_limit_min_cu: 0.5
        autoscaling_limit_max_cu: 2
      lifecycle:
        prevent_destroy: true

targets:

  dev:
    resources:
      postgres_projects:
        hi_genie_lakebase:
          display_name: Hey Isaac / Hi Genie — Lakebase [${bundle.target}]
          default_endpoint_settings:
            autoscaling_limit_min_cu: 0.5
            autoscaling_limit_max_cu: 2
