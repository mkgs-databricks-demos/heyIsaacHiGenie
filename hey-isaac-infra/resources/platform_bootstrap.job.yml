# Platform bootstrap job — run once after infra bundle deploy.
#
# Responsibilities:
#   1. Store workspace_url in the secret scope (auto-provisioned)
#   2. Validate admin-provisioned secrets are present (jwt_signing_key)
#   3. Execute Lakebase DDL (schema + dev seed) when lakebase_connection_string is set
#
# Admin must provision jwt_signing_key before this job succeeds.
# Run via: ./deploy.sh --target dev --run-setup

resources:
  jobs:
    platform_bootstrap:
      name: "[${bundle.target}] hi-genie platform bootstrap"
      parameters:
        - name: secret_scope_name
          default: ${var.secret_scope_name}
        - name: lakebase_connection_string
          default: ${var.lakebase_connection_string}
        - name: target
          default: ${var.target}
      tasks:
        - task_key: bootstrap
          notebook_task:
            notebook_path: ../src/notebooks/platform_bootstrap.py
            base_parameters:
              secret_scope_name: ${var.secret_scope_name}
              lakebase_connection_string: ${var.lakebase_connection_string}
              target: ${var.target}
          environment_key: serverless
      environments:
        - environment_key: serverless
          spec:
            environment_version: "${var.serverless_environment_version}"
      run_as:
        user_name: ${var.run_as_user}
