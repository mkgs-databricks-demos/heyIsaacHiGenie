# Secret scope for Hey Isaac / Hi Genie platform credentials.
#
# AUTO-PROVISIONED by the platform_bootstrap job:
#   workspace_url          — Databricks workspace URL (https://...)
#
# ADMIN-PROVISIONED (must be created manually before deploying the app bundle):
#   jwt_signing_key        — HMAC secret for persona JWT signing
#                            Generate: openssl rand -base64 64
#   github_client_id       — GitHub OAuth App client ID (Phase 5, external agent auth)
#   github_client_secret   — GitHub OAuth App client secret (Phase 5)
#
# To provision:
#   databricks secrets put-secret dev_<user_handle>_hi_genie_credentials jwt_signing_key \
#     --string-value "$(openssl rand -base64 64)"

resources:
  secret_scopes:
    hi_genie_secret_scope:
      name: ${var.secret_scope_name}
      backend_type: DATABRICKS

targets:

  dev:
    resources:
      secret_scopes:
        hi_genie_secret_scope:
          name: ${var.secret_scope_name}
          permissions:
            - user_name: ${workspace.current_user.userName}
              level: MANAGE

  staging:
    resources:
      secret_scopes:
        hi_genie_secret_scope:
          lifecycle:
            prevent_destroy: true
