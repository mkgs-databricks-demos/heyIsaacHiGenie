# Ensures the app's auto-provisioned SPN has READ on the secret scope and has
# the required Lakebase Postgres permissions (GRANT ALL ON SCHEMA public, etc.).
# Run by deploy.sh after the app bundle deploys and the SPN is known.
# Idempotent — put_acl is an upsert; SQL GRANTs are safe to re-run.

resources:
  jobs:
    configure_app_spn:
      name: "[${bundle.target}] hi-genie configure app SPN scope access"
      parameters:
        - name: principal
          default: ""
        - name: secret_scope_name
          default: ${var.secret_scope_name}
        - name: lakebase_connection_string
          default: "__unset__"
      tasks:
        - task_key: configure_spn
          notebook_task:
            notebook_path: ../src/notebooks/configure_app_spn.py
            base_parameters:
              principal: "{{job.parameters.principal}}"
              secret_scope_name: ${var.secret_scope_name}
              lakebase_connection_string: "{{job.parameters.lakebase_connection_string}}"
          environment_key: serverless
      environments:
        - environment_key: serverless
          spec:
            environment_version: "${var.serverless_environment_version}"
      run_as:
        user_name: ${var.run_as_user}
