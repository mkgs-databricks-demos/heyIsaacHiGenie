bundle:
  name: hey-isaac-ai

include:
  - resources/*.yml

variables:
  catalog:
    description: >
      Unity Catalog catalog for Hey Isaac / Hi Genie data objects.
      Resolved from infra bundle schema resource at deploy time.
  schema:
    description: >
      Unity Catalog schema name (fully resolved, including dev-mode prefix).
      Resolved from infra bundle schema resource at deploy time.
  secret_scope_name:
    description: Databricks secret scope for Hey Isaac / Hi Genie credentials.
    default: hi_genie_dev_credentials
  workspace_id:
    description: >-
      Numeric workspace ID (from the workspace URL, e.g. 7474657291520070).
      Used to compute the app public URL and persona issuer.
    # No default — must be set per target.
  cloud:
    description: >-
      Cloud provider slug for the workspace (aws, azure, gcp).
      Used to compute the app public URL and persona issuer.
    default: aws
  persona_issuer:
    description: >-
      Fully-qualified URL of the persona token issuer endpoint.
      Derived from app_name, workspace_id, and cloud.
    default: "https://${var.app_name}-${var.workspace_id}.${var.cloud}.databricksapps.com/token/persona"
  lakebase_project_id:
    description: >
      Lakebase Autoscaling project ID.
      Resolved from infra bundle postgres_projects resource.
  lakebase_database_id:
    description: >
      Lakebase database resource ID (auto-generated on first project deploy).
      Resolved by deploy.sh via: databricks postgres list-databases
      projects/{project_id}/branches/<branch_id>
    default: ""
  app_name:
    description: >
      Platform app name. Target-specific to allow dev and production apps
      to coexist in the same workspace.
  app_spn_id:
    description: >
      The app's auto-provisioned SPN client_id. Only known after first deploy.
      Populated by deploy.sh via: databricks apps get <name>.
    default: ""
  run_as_user:
    description: The user or service principal that jobs run as.
    default: ${workspace.current_user.userName}
  user_handle:
    description: >
      Deploying user's handle (e.g. matthew_giglia) — email prefix with dots
      replaced by underscores. Injected automatically by deploy.sh for the dev
      target. Do not set manually.
    default: ""
  higher_level_service_principal:
    description: Service principal application ID for non-dev deployments.
    default: ""
  serverless_environment_version:
    description: The serverless environment version for notebook/job tasks.
    default: "5"
  tags_project:
    default: hey-isaac-hi-genie
    description: Project tag for deployed resources.
  tags_developer:
    default: ""
    description: Primary developer contact.
  tags_RemoveAfter:
    default: 2027-06-30
    description: Required demo-environment expiry tag.

targets:

  dev:
    mode: development
    default: true
    presets:
      source_linked_deployment: false
      tags:
        project: ${var.tags_project}
        developer: ${var.tags_developer}
        RemoveAfter: ${var.tags_RemoveAfter}
        env: ${bundle.target}
    workspace:
      host: https://fevm-hls-fde.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: hls_fde_dev
      schema: dev_${var.user_handle}_hi_genie
      lakebase_project_id: dev-hi-genie
      workspace_id: "7474657291520070"
      cloud: aws
      secret_scope_name: hi_genie_dev_credentials
      # lakebase_database_id: resolved by deploy.sh --var at deploy time
      lakebase_database_id: ""
      # prod targets should explicitly set run_as_user to a service principal
      app_name: hey-isaac-hi-genie-dev

  staging:
    workspace:
      host: https://fevm-hls-fde.cloud.databricks.com
    variables:
      catalog: hls_fde_staging
      schema: hi_genie
      lakebase_project_id: hi-genie          # production Lakebase project
      app_name: hey-isaac-hi-genie-staging
      workspace_id: "7474657291520070"
      cloud: aws
      secret_scope_name: hi_genie_staging_credentials
      # lakebase_database_id, app_spn_id, run_as_user left unset (operator fills before first staging deploy)
      # user_handle not needed — no mode: development prefix on staging
